<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RelayProbe</title>
  <style>
    :root {
      --page: #eef3f8;
      --ink: #101828;
      --muted: #667085;
      --soft: #f7f9fc;
      --panel: #ffffff;
      --line: #d7dee8;
      --line-strong: #b8c4d4;
      --navy: #0f172a;
      --navy-2: #172033;
      --blue: #2563eb;
      --blue-2: #1d4ed8;
      --green: #079455;
      --amber: #b54708;
      --red: #d92d20;
      --green-bg: #ecfdf3;
      --amber-bg: #fffaeb;
      --red-bg: #fef3f2;
      --code: #0b1220;
      --shadow: 0 16px 36px rgba(16, 24, 40, 0.10);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        linear-gradient(180deg, #0f172a 0, #111c31 236px, var(--page) 236px),
        var(--page);
      font-family: Inter, "Segoe UI", Arial, "Microsoft YaHei", sans-serif;
      line-height: 1.45;
    }

    button, input { font: inherit; }
    button { cursor: pointer; }

    .shell {
      width: min(1280px, calc(100% - 32px));
      margin: 0 auto;
      padding: 24px 0 42px;
    }

    .topbar {
      color: #fff;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 22px;
    }

    .brand h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.12;
      font-weight: 760;
      letter-spacing: 0;
    }

    .brand p {
      margin: 0;
      max-width: 680px;
      color: #cbd5e1;
      font-size: 14px;
    }

    .proxy-card {
      min-width: 224px;
      padding: 12px 14px;
      border: 1px solid rgba(203, 213, 225, 0.22);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.07);
    }

    .proxy-label {
      display: block;
      color: #94a3b8;
      font-size: 12px;
      margin-bottom: 4px;
    }

    .proxy-value {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #f8fafc;
      font-size: 13px;
      font-family: Consolas, "Fira Code", monospace;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #22c55e;
      box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.14);
      flex: 0 0 auto;
    }

    .stats-strip {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .stat {
      min-height: 76px;
      padding: 14px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: var(--shadow);
    }

    .stat-label {
      display: block;
      margin-bottom: 7px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }

    .stat-value {
      display: block;
      color: var(--ink);
      font-size: 24px;
      line-height: 1;
      font-weight: 780;
    }

    .stat-value.small {
      font-size: 13px;
      line-height: 1.35;
      font-family: Consolas, "Fira Code", monospace;
      word-break: break-all;
    }

    .grid {
      display: grid;
      grid-template-columns: 360px minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 58px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfe;
    }

    .panel-title {
      margin: 0;
      font-size: 15px;
      line-height: 1.2;
      font-weight: 760;
      letter-spacing: 0;
    }

    .panel-subtitle {
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
    }

    .panel-body { padding: 16px; }

    .stack { display: grid; gap: 16px; }
    .field { display: grid; gap: 7px; }

    label, .field-label {
      color: #344054;
      font-size: 12px;
      font-weight: 720;
    }

    .input {
      width: 100%;
      min-height: 42px;
      padding: 9px 11px;
      border: 1px solid var(--line-strong);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      outline: none;
      transition: border-color 160ms ease, box-shadow 160ms ease;
    }

    .input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.14);
    }

    .type-grid {
      display: grid;
      gap: 8px;
    }

    .type-option {
      position: relative;
      display: grid;
      grid-template-columns: 18px 1fr;
      gap: 10px;
      padding: 11px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      transition: border-color 160ms ease, background 160ms ease, box-shadow 160ms ease;
    }

    .type-option:hover {
      border-color: #93b4f4;
      background: #f8fbff;
    }

    .type-option:has(input:checked) {
      border-color: var(--blue);
      background: #eff6ff;
      box-shadow: inset 0 0 0 1px rgba(37, 99, 235, 0.20);
    }

    .type-option input {
      width: 16px;
      height: 16px;
      margin-top: 2px;
      accent-color: var(--blue);
    }

    .type-name {
      display: block;
      color: var(--code);
      font-family: Consolas, "Fira Code", monospace;
      font-size: 13px;
      font-weight: 700;
      word-break: break-all;
    }

    .type-path {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-family: Consolas, "Fira Code", monospace;
      font-size: 12px;
      word-break: break-all;
    }

    .actions, .toolbar-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .test-flow {
      padding: 12px;
      margin-top: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--soft);
    }

    .test-flow-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .test-flow-title {
      color: #344054;
      font-size: 12px;
      font-weight: 760;
    }

    .test-flow-hint {
      color: var(--muted);
      font-size: 12px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      padding: 8px 13px;
      border: 1px solid transparent;
      border-radius: 6px;
      color: #fff;
      background: var(--blue);
      font-size: 13px;
      font-weight: 740;
      transition: background 160ms ease, border-color 160ms ease, color 160ms ease;
    }

    .button:hover { background: var(--blue-2); }
    .button:focus-visible { outline: 3px solid rgba(37, 99, 235, 0.24); outline-offset: 2px; }
    .button:disabled { cursor: not-allowed; opacity: 0.62; }

    .button.secondary {
      color: #344054;
      background: #fff;
      border-color: var(--line-strong);
    }

    .button.secondary:hover {
      color: var(--blue-2);
      border-color: #93b4f4;
      background: #f8fbff;
    }

    .button.success { background: var(--green); }
    .button.success:hover { background: #067647; }

    .notice {
      min-height: 36px;
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--soft);
      color: var(--muted);
      font-size: 12px;
    }

    .notice.error-text {
      border-color: #fecdca;
      background: var(--red-bg);
      color: var(--red);
    }

    .content-stack { display: grid; gap: 16px; }

    .empty {
      min-height: 172px;
      display: grid;
      place-items: center;
      padding: 32px 18px;
      color: var(--muted);
      background: var(--soft);
      border: 1px dashed var(--line-strong);
      border-radius: 8px;
      text-align: center;
      font-size: 13px;
    }

    .model-list {
      display: grid;
      gap: 8px;
      max-height: 360px;
      overflow: auto;
      padding-right: 4px;
    }

    .model-row {
      display: grid;
      grid-template-columns: 20px minmax(0, 1fr);
      gap: 10px;
      padding: 11px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      transition: border-color 160ms ease, background 160ms ease;
    }

    .model-row:hover {
      border-color: #93b4f4;
      background: #f8fbff;
    }

    .model-row input {
      width: 16px;
      height: 16px;
      margin-top: 2px;
      accent-color: var(--blue);
      cursor: pointer;
    }

    .model-id {
      display: block;
      color: var(--code);
      font-family: Consolas, "Fira Code", monospace;
      font-size: 13px;
      font-weight: 700;
      word-break: break-all;
    }

    .model-meta {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      word-break: break-word;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }

    .metric {
      min-height: 70px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .metric-label {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }

    .metric-value {
      display: block;
      color: var(--ink);
      font-size: 23px;
      line-height: 1;
      font-weight: 780;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    table {
      width: 100%;
      min-width: 880px;
      border-collapse: collapse;
    }

    th, td {
      padding: 11px 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
      font-size: 13px;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 1;
      color: #475467;
      background: #f8fafc;
      font-weight: 760;
    }

    tr:last-child td { border-bottom: 0; }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 24px;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 760;
      white-space: nowrap;
    }

    .badge.testing { color: var(--amber); background: var(--amber-bg); }
    .badge.success { color: var(--green); background: var(--green-bg); }
    .badge.error { color: var(--red); background: var(--red-bg); }

    .mono {
      color: var(--code);
      font-family: Consolas, "Fira Code", monospace;
      font-size: 12px;
      word-break: break-all;
    }

    .response-preview {
      max-width: 390px;
      max-height: 132px;
      overflow: auto;
      white-space: pre-wrap;
      color: var(--code);
      font-family: Consolas, "Fira Code", monospace;
      font-size: 12px;
    }

    .error-text { color: var(--red); }

    .spinner {
      width: 13px;
      height: 13px;
      margin-right: 7px;
      border: 2px solid rgba(255, 255, 255, 0.45);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 760ms linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 1ms !important; transition-duration: 1ms !important; }
    }

    @media (max-width: 980px) {
      body { background: linear-gradient(180deg, #0f172a 0, #111c31 300px, var(--page) 300px), var(--page); }
      .topbar { flex-direction: column; }
      .proxy-card { width: 100%; }
      .grid { grid-template-columns: 1fr; }
      .stats-strip { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 560px) {
      .shell { width: min(100% - 20px, 1280px); padding-top: 18px; }
      .brand h1 { font-size: 24px; }
      .stats-strip, .summary { grid-template-columns: 1fr; }
      .panel-header { align-items: flex-start; flex-direction: column; }
      .type-grid { grid-template-columns: 1fr; }
      .test-flow-head { align-items: flex-start; flex-direction: column; }
      .actions .button, .toolbar-actions .button { flex: 1 1 100%; }
      .model-list { max-height: 300px; }
    }
    /* Product workflow layout overrides */
    .grid {
      display: grid;
      gap: 16px;
      align-items: start;
    }

    .connect-grid {
      display: grid;
      grid-template-columns: minmax(260px, 1.35fr) minmax(240px, 1fr) auto;
      gap: 12px;
      align-items: end;
    }

    .selection-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 14px;
      align-items: stretch;
    }

    .subpanel {
      min-height: 100%;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--soft);
    }

    .subpanel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .subpanel-title {
      color: #344054;
      font-size: 12px;
      font-weight: 760;
    }

    .subpanel-hint {
      color: var(--muted);
      font-size: 12px;
      text-align: right;
    }

    .selection-grid .type-grid {
      margin-bottom: 0;
      grid-template-columns: 1fr;
    }

    @media (max-width: 980px) {
      .connect-grid,
      .selection-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 560px) {
      .subpanel-head {
        align-items: flex-start;
        flex-direction: column;
      }
    }
    /* Final product layout fix */
    .grid {
      display: flex !important;
      flex-direction: column !important;
      gap: 16px !important;
      align-items: stretch !important;
    }

    .grid > .panel,
    .grid > .content-stack,
    .content-stack > .panel {
      width: 100% !important;
    }

    .content-stack {
      display: flex !important;
      flex-direction: column !important;
      gap: 16px !important;
    }

    .connect-grid {
      display: grid !important;
      grid-template-columns: minmax(280px, 1.4fr) minmax(260px, 1fr) auto !important;
      gap: 12px !important;
      align-items: end !important;
    }

    .selection-grid {
      display: grid !important;
      grid-template-columns: minmax(0, 1fr) 360px !important;
      gap: 14px !important;
      align-items: stretch !important;
    }

    .connect-grid .actions {
      align-items: end;
      justify-content: flex-start;
    }

    .panel-header {
      min-height: 58px;
    }

    .panel-subtitle {
      max-width: 720px;
    }

    .selection-grid .type-grid {
      grid-template-columns: 1fr !important;
      margin-bottom: 0 !important;
    }

    .test-flow {
      margin-top: 0;
    }

    @media (max-width: 980px) {
      .connect-grid,
      .selection-grid {
        grid-template-columns: 1fr !important;
      }
    }
    /* Compact workflow polish */
    .grid > .panel:first-child .panel-body {
      padding: 14px 16px;
    }

    .grid > .panel:first-child .notice {
      margin-top: 10px !important;
    }

    .connect-grid .input {
      height: 40px;
    }

    .connect-grid .button {
      min-height: 40px;
    }

    .selection-grid .empty {
      min-height: 160px;
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="brand">
        <h1>RelayProbe</h1>
        <p>批量验证中转站模型可用性。</p>
      </div>
      <div class="proxy-card" aria-label="代理状态">
        <span class="proxy-label">Local proxy</span>
        <span class="proxy-value"><span class="status-dot"></span>127.0.0.1:8787</span>
      </div>
    </header>

    <section class="stats-strip" aria-label="当前状态">
      <div class="stat"><span class="stat-label">Base URL</span><span class="stat-value small" id="baseUrlStat">未配置</span></div>
      <div class="stat"><span class="stat-label">模型数</span><span class="stat-value" id="modelCountStat">0</span></div>
      <div class="stat"><span class="stat-label">已选择</span><span class="stat-value" id="selectedCountStat">0</span></div>
      <div class="stat"><span class="stat-label">测试类型</span><span class="stat-value small" id="endpointStat">codex_responses</span></div>
    </section>

    <div class="grid">
      <section class="panel" aria-labelledby="configTitle">
        <div class="panel-header">
          <div>
            <h2 class="panel-title" id="configTitle">连接中转站</h2>
            <div class="panel-subtitle">填写地址和密钥，获取模型列表。</div>
          </div>
        </div>
        <div class="panel-body">
          <div class="connect-grid">
            <div class="field">
              <label for="baseUrl">Base URL</label>
              <input class="input" id="baseUrl" type="text" spellcheck="false" placeholder="https://api.example.com">
            </div>
            <div class="field">
              <label for="apiKey">API Key</label>
              <input class="input" id="apiKey" type="password" autocomplete="off" placeholder="sk-...">
            </div>
            <div class="actions">
              <button class="button" id="fetchModelsBtn" type="button">获取模型</button>
              <button class="button secondary" id="clearBtn" type="button">清空结果</button>
            </div>
          </div>
          <div class="notice" id="notice" style="margin-top: 12px;">请求会通过本地代理转发到中转站。</div>
        </div>
      </section>

      <section class="panel" aria-labelledby="modelsTitle">
        <div class="panel-header">
          <div>
            <h2 class="panel-title" id="modelsTitle">选择模型与测试类型</h2>
            <div class="panel-subtitle">勾选模型，选择统一测试类型。</div>
          </div>
          <div class="toolbar-actions">
            <button class="button secondary" id="selectAllBtn" type="button">全选</button>
            <button class="button secondary" id="selectNoneBtn" type="button">全不选</button>
            <button class="button success" id="testBtn" type="button">开始测试</button>
          </div>
        </div>
        <div class="panel-body">
          <div class="selection-grid">
            <div class="subpanel">
              <div class="subpanel-head">
                <span class="subpanel-title">模型列表</span>
                <span class="subpanel-hint">选择要检测的模型</span>
              </div>
              <div id="modelList" class="empty">尚未获取模型。</div>
            </div>
            <div class="subpanel" aria-label="测试类型选择">
              <div class="subpanel-head">
                <span class="subpanel-title">本次测试类型</span>
                <span class="subpanel-hint">对已选模型统一生效</span>
              </div>
              <div class="type-grid" role="radiogroup" aria-label="模型类型">
                <label class="type-option">
                  <input type="radio" name="endpointType" value="codex_responses" checked>
                  <span><span class="type-name">codex_responses</span><span class="type-path">/v1/responses</span></span>
                </label>
                <label class="type-option">
                  <input type="radio" name="endpointType" value="chat_completions">
                  <span><span class="type-name">chat_completions</span><span class="type-path">/v1/chat/completions</span></span>
                </label>
                <label class="type-option">
                  <input type="radio" name="endpointType" value="anthropic">
                  <span><span class="type-name">anthropic</span><span class="type-path">/v1/messages</span></span>
                </label>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="panel" aria-labelledby="resultsTitle">
        <div class="panel-header">
          <div>
            <h2 class="panel-title" id="resultsTitle">查看测试结果</h2>
            <div class="panel-subtitle">查看状态、耗时和响应摘要。</div>
          </div>
        </div>
        <div class="panel-body">
          <div class="summary" id="summary"></div>
          <div id="resultsEmpty" class="empty">尚未开始测试。</div>
          <div class="table-wrap" id="resultsWrap" hidden>
            <table>
              <thead>
                <tr>
                  <th>模型</th>
                  <th>接口</th>
                  <th>状态</th>
                  <th>HTTP</th>
                  <th>返回模型</th>
                  <th>耗时</th>
                  <th>返回摘要</th>
                </tr>
              </thead>
              <tbody id="resultsBody"></tbody>
            </table>
          </div>
        </div>
      </section>
    </div>  </main>

  <script>
    const state = { models: [], results: [], testing: false };
    const endpointLabels = {
      codex_responses: '/v1/responses',
      chat_completions: '/v1/chat/completions',
      anthropic: '/v1/messages',
    };

    const elements = {
      baseUrl: document.getElementById('baseUrl'),
      apiKey: document.getElementById('apiKey'),
      fetchModelsBtn: document.getElementById('fetchModelsBtn'),
      clearBtn: document.getElementById('clearBtn'),
      modelList: document.getElementById('modelList'),
      selectAllBtn: document.getElementById('selectAllBtn'),
      selectNoneBtn: document.getElementById('selectNoneBtn'),
      testBtn: document.getElementById('testBtn'),
      summary: document.getElementById('summary'),
      resultsBody: document.getElementById('resultsBody'),
      resultsWrap: document.getElementById('resultsWrap'),
      resultsEmpty: document.getElementById('resultsEmpty'),
      notice: document.getElementById('notice'),
      baseUrlStat: document.getElementById('baseUrlStat'),
      modelCountStat: document.getElementById('modelCountStat'),
      selectedCountStat: document.getElementById('selectedCountStat'),
      endpointStat: document.getElementById('endpointStat'),
    };

    elements.fetchModelsBtn.addEventListener('click', fetchModels);
    elements.clearBtn.addEventListener('click', clearResults);
    elements.selectAllBtn.addEventListener('click', () => setAllModelsChecked(true));
    elements.selectNoneBtn.addEventListener('click', () => setAllModelsChecked(false));
    elements.testBtn.addEventListener('click', runTests);
    elements.baseUrl.addEventListener('input', updateStats);
    document.querySelectorAll('input[name="endpointType"]').forEach((input) => input.addEventListener('change', updateStats));
    updateSummary();
    updateStats();

    function getConfig() {
      return { baseUrl: elements.baseUrl.value.trim(), apiKey: elements.apiKey.value.trim() };
    }

    function getEndpointType() {
      return document.querySelector('input[name="endpointType"]:checked').value;
    }

    function setBusy(button, isBusy, busyText, normalText) {
      button.disabled = isBusy;
      button.innerHTML = isBusy ? `<span class="spinner"></span>${escapeHtml(busyText)}` : escapeHtml(normalText);
    }

    function setNotice(message, isError = false) {
      elements.notice.textContent = message;
      elements.notice.className = isError ? 'notice error-text' : 'notice';
    }

    async function postJson(path, payload) {
      const response = await fetch(path, {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const text = await response.text();
      const data = parseJsonOrText(text);
      if (!response.ok) {
        const message = typeof data === 'object' && data && data.error ? data.error : text;
        const error = new Error(message || `HTTP ${response.status}`);
        error.status = response.status;
        error.payload = data;
        throw error;
      }
      return { status: response.status, data };
    }

    async function fetchModels() {
      const config = getConfig();
      if (!config.baseUrl || !config.apiKey) {
        setNotice('请填写 Base URL 和 API Key。', true);
        return;
      }

      setBusy(elements.fetchModelsBtn, true, '获取中', '获取模型');
      setNotice('正在获取模型列表...');

      try {
        const { data } = await postJson('/api/models', config);
        state.models = normalizeModels(data);
        renderModels();
        setNotice(state.models.length ? `已获取 ${state.models.length} 个模型。` : '未在返回数据中找到模型。', state.models.length === 0);
      } catch (error) {
        state.models = [];
        renderModels();
        setNotice(`获取模型失败：${error.message}`, true);
      } finally {
        setBusy(elements.fetchModelsBtn, false, '获取中', '获取模型');
        updateStats();
      }
    }

    function normalizeModels(data) {
      const rawModels = Array.isArray(data)
        ? data
        : Array.isArray(data && data.data)
          ? data.data
          : Array.isArray(data && data.models)
            ? data.models
            : [];

      return rawModels.map((model) => {
        if (typeof model === 'string') return { id: model };
        return {
          id: model && (model.id || model.name || model.model),
          owned_by: model && model.owned_by,
          created: model && model.created,
          supported_endpoint_types: model && model.supported_endpoint_types,
        };
      }).filter((model) => model.id);
    }

    function renderModels() {
      if (state.models.length === 0) {
        elements.modelList.className = 'empty';
        elements.modelList.innerHTML = '尚未获取模型。';
        updateStats();
        return;
      }

      elements.modelList.className = 'model-list';
      elements.modelList.innerHTML = state.models.map((model, index) => {
        const supported = formatSupportedEndpoints(model.supported_endpoint_types);
        const meta = [
          model.owned_by ? `提供方：${model.owned_by}` : '',
          supported ? `支持：${supported}` : '',
          model.created ? `创建时间：${model.created}` : '',
        ].filter(Boolean).join(' · ');

        return `
          <label class="model-row">
            <input type="checkbox" class="model-checkbox" data-index="${index}" checked>
            <span>
              <span class="model-id">${escapeHtml(model.id)}</span>
              ${meta ? `<span class="model-meta">${escapeHtml(meta)}</span>` : ''}
            </span>
          </label>
        `;
      }).join('');

      document.querySelectorAll('.model-checkbox').forEach((checkbox) => checkbox.addEventListener('change', updateStats));
      updateStats();
    }

    function setAllModelsChecked(checked) {
      document.querySelectorAll('.model-checkbox').forEach((checkbox) => { checkbox.checked = checked; });
      updateStats();
    }

    function getSelectedModels() {
      return Array.from(document.querySelectorAll('.model-checkbox:checked'))
        .map((checkbox) => state.models[Number(checkbox.dataset.index)])
        .filter(Boolean);
    }

    async function runTests() {
      if (state.testing) {
        setNotice('测试正在进行中。', true);
        return;
      }

      const config = getConfig();
      const selectedModels = getSelectedModels();
      const endpointType = getEndpointType();

      if (!config.baseUrl || !config.apiKey) {
        setNotice('请填写 Base URL 和 API Key。', true);
        return;
      }
      if (selectedModels.length === 0) {
        setNotice('请至少选择一个模型。', true);
        return;
      }

      state.testing = true;
      state.results = selectedModels.map((model) => ({
        id: crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random()}`,
        model: model.id,
        endpointType,
        status: 'testing',
        httpStatus: '',
        returnedModel: '',
        duration: '',
        preview: '',
        startedAt: performance.now(),
      }));

      renderResults();
      updateSummary();
      setBusy(elements.testBtn, true, '测试中', '开始测试');
      setNotice(`正在使用 ${endpointType} 测试 ${selectedModels.length} 个模型...`);

      await Promise.all(state.results.map((result) => testOneModel(config, result)));

      state.testing = false;
      setBusy(elements.testBtn, false, '测试中', '开始测试');
      updateSummary();
      setNotice('测试已结束。');
    }

    async function testOneModel(config, result) {
      try {
        const { status, data } = await postJson('/api/test', { ...config, model: result.model, endpointType: result.endpointType });
        result.status = 'success';
        result.httpStatus = status;
        result.returnedModel = data && data.model ? data.model : '';
        result.preview = extractPreview(data, result.endpointType);
      } catch (error) {
        result.status = 'error';
        result.httpStatus = error.status || '';
        result.returnedModel = '';
        result.preview = error.payload ? formatPreview(error.payload) : error.message;
      } finally {
        result.duration = `${Math.round(performance.now() - result.startedAt)}ms`;
        renderResults();
        updateSummary();
      }
    }

    function extractPreview(data, endpointType) {
      if (endpointType === 'codex_responses') {
        if (typeof data.output_text === 'string') return data.output_text;
        const outputText = findText(data.output);
        return outputText || formatPreview(data);
      }
      if (endpointType === 'chat_completions') {
        return data.choices && data.choices[0] && data.choices[0].message
          ? data.choices[0].message.content || formatPreview(data)
          : formatPreview(data);
      }
      if (endpointType === 'anthropic') {
        const content = data.content;
        if (Array.isArray(content)) {
          const text = content.map((item) => typeof item === 'string' ? item : item && item.text).filter(Boolean).join('\n');
          return text || formatPreview(data);
        }
      }
      return formatPreview(data);
    }

    function findText(value) {
      if (!value) return '';
      if (typeof value === 'string') return value;
      if (Array.isArray(value)) return value.map(findText).filter(Boolean).join('\n');
      if (typeof value === 'object') {
        if (typeof value.text === 'string') return value.text;
        if (typeof value.content === 'string') return value.content;
        return Object.values(value).map(findText).filter(Boolean).join('\n');
      }
      return '';
    }

    function renderResults() {
      if (state.results.length === 0) {
        elements.resultsWrap.hidden = true;
        elements.resultsEmpty.hidden = false;
        elements.resultsBody.innerHTML = '';
        return;
      }

      elements.resultsWrap.hidden = false;
      elements.resultsEmpty.hidden = true;
      elements.resultsBody.innerHTML = state.results.map((result) => `
        <tr>
          <td class="mono">${escapeHtml(result.model)}</td>
          <td class="mono">${escapeHtml(endpointLabels[result.endpointType])}</td>
          <td>${renderStatus(result.status)}</td>
          <td>${escapeHtml(String(result.httpStatus || '-'))}</td>
          <td class="mono">${escapeHtml(result.returnedModel || '-')}</td>
          <td>${escapeHtml(result.duration || '-')}</td>
          <td><div class="response-preview ${result.status === 'error' ? 'error-text' : ''}">${escapeHtml(result.preview || '-')}</div></td>
        </tr>
      `).join('');
    }

    function renderStatus(status) {
      const labels = { testing: '测试中', success: '成功', error: '失败' };
      return `<span class="badge ${status}">${labels[status] || status}</span>`;
    }

    function updateSummary() {
      const total = state.results.length;
      const success = state.results.filter((item) => item.status === 'success').length;
      const error = state.results.filter((item) => item.status === 'error').length;
      const testing = state.results.filter((item) => item.status === 'testing').length;
      elements.summary.innerHTML = `
        <div class="metric"><span class="metric-label">总数</span><span class="metric-value">${total}</span></div>
        <div class="metric"><span class="metric-label">成功</span><span class="metric-value" style="color: var(--green);">${success}</span></div>
        <div class="metric"><span class="metric-label">失败</span><span class="metric-value" style="color: var(--red);">${error}</span></div>
        <div class="metric"><span class="metric-label">测试中</span><span class="metric-value" style="color: var(--amber);">${testing}</span></div>
      `;
    }

    function updateStats() {
      const baseUrl = elements.baseUrl.value.trim();
      elements.baseUrlStat.textContent = baseUrl || '未配置';
      elements.modelCountStat.textContent = String(state.models.length);
      elements.selectedCountStat.textContent = String(getSelectedModels().length);
      elements.endpointStat.textContent = getEndpointType();
    }

    function clearResults() {
      state.results = [];
      renderResults();
      updateSummary();
      setNotice('测试结果已清空。');
    }

    function formatSupportedEndpoints(value) {
      if (!Array.isArray(value) || value.length === 0) return '';
      return value.map((item) => {
        if (item === 'openai') return 'OpenAI';
        if (item === 'chat_completions') return 'chat_completions';
        if (item === 'codex_responses') return 'codex_responses';
        if (item === 'anthropic' || item === 'claude') return 'anthropic';
        return String(item);
      }).join(', ');
    }

    function parseJsonOrText(text) {
      if (!text) return null;
      try { return JSON.parse(text); } catch { return text; }
    }

    function formatPreview(value) {
      const preview = typeof value === 'string' ? value : JSON.stringify(value, null, 2);
      return preview.length > 1600 ? `${preview.slice(0, 1600)}\n...` : preview;
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }
  </script>
</body>
</html>
